<!-- Step 1: include our secure javascript file -->
<script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=88d0c7b9a32a465da20a22e0e61756f3"></script>

<!-- Step 2: add an element to the page -->
<div style="width:100%; height:100%; display:flex; justify-content:center;">
  <div id="calculator" style="width:80%; height:120%;"></div>
</div>

<!-- Step 3: add the following lines of javascript -->
<script>
    const elt = document.getElementById('calculator');
  const calc = Desmos.Calculator(elt, {
    expressions: false,
    settingsMenu: false,
    keypad: false,
  });
     async function loadState() {
    const res = await fetch("/assets/desmos/json_files/legendre_transform.json");
    if (!res.ok) throw new Error(`Failed to load state: ${res.status} ${res.statusText}`);
    const state = await res.json();
    calc.setState(state);
  }

    loadState().catch(err => console.error(err));

</script>
