<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Moving sofa — turning a corner</title>
<style>
:root{
  --ground:#f7f5f0;
  --ground-deep:#efe9db;
  --ink:#37474f;
  --ink-mute:#6f777d;
  --ink-faint:#b0bec5;
  --accent:#546e7a;
  --serif:Garamond,"Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --mono:"SF Mono","JetBrains Mono","IBM Plex Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ground);height:auto}
body{
  color:var(--ink);
  font-family:var(--serif);
  -webkit-font-smoothing:antialiased;
  padding:16px;
}
.plate{max-width:none;margin:0}

/* ---- top readout bar ---- */
.bar{display:flex;flex-wrap:wrap;gap:26px;align-items:baseline;padding:0 0 15px;font-family:var(--mono)}
.grp{display:flex;align-items:baseline;gap:9px}
.grp>span{color:var(--ink-mute);letter-spacing:.13em;text-transform:uppercase;font-size:9.5px}
.grp b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;font-size:22px}
.badge-regime{font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);border:1px solid var(--ink-faint);border-radius:999px;padding:2px 9px}
.rule{height:1px;background:var(--ink-faint);margin:0 0 16px;opacity:.55}

/* ---- controls ---- */
.ctlrow{display:flex;flex-wrap:wrap;align-items:center;gap:20px;margin-bottom:14px}
.ctl{display:flex;flex-direction:column;gap:6px;min-width:260px;flex:1}
.lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.03em}
.lab b{color:var(--ink);font-variant-numeric:tabular-nums}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:3px;background:var(--ink-faint);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ground);border:2px solid var(--accent);cursor:pointer;transition:background .15s}
input[type=range]:hover::-webkit-slider-thumb{background:var(--accent)}
input[type=range]::-moz-range-track{background:var(--ink-faint);height:3px;border-radius:3px}
input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--ground);border:2px solid var(--accent);cursor:pointer}

button{
  font-family:var(--mono);font-size:0.82rem;background:#f4f6f8;color:var(--ink);
  border:1px solid var(--ink-faint);border-radius:6px;padding:0.4rem 1rem;cursor:pointer;letter-spacing:.02em;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
  transition:background .15s,border-color .15s,box-shadow .15s;
}
button:hover{background:#e8edf2;border-color:#90a4ae;box-shadow:0 2px 6px rgba(0,0,0,.15)}
button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

.hint{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.03em}

#status{font-family:var(--mono);color:var(--ink-mute);font-size:10.5px;padding:10px 0 2px}

/* ---- construction-mode segmented control ---- */
.modeGroup{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--ink-faint);border-radius:6px;overflow:hidden}
.modeGroup label{font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.02em;
  padding:0.45rem 0.7rem;cursor:pointer;user-select:none;border-right:1px solid var(--ink-faint);
  transition:background .15s,color .15s}
.modeGroup label:last-child{border-right:none}
.modeGroup input{width:0;height:0;opacity:0;margin:0;padding:0;border:0}
.modeGroup input:checked + label{background:var(--accent);color:#fff}
.modeGroup label:hover{background:#e8e2d2}
.modeGroup input:checked + label:hover{background:var(--accent)}

/* ---- figure ---- */
#game{width:100%;height:600px;border-radius:4px;background:var(--ground);margin-top:2px;overflow:hidden;
  touch-action:none;cursor:grab;border:1px solid var(--ink-faint)}
#game.grabbing{cursor:grabbing}
#game canvas{display:block}

@media (max-width:700px){ #game{height:440px} }
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

  <div class="plate">
    <div class="bar">
      <div class="grp"><span>angle</span><b><span id="aval">90.0</span>&deg;</b></div>
      <div class="grp"><span class="badge-regime" id="regime">right angle</span></div>
      <div class="grp"><span>area</span><b id="area">&mdash;</b></div>
    </div>
    <div class="rule"></div>

    <div class="ctlrow">
      <div class="ctl">
        <div class="lab"><span>Corner angle</span><span>sharp &harr; straight</span></div>
        <input type="range" id="alpha" min="20" max="170" step="0.5" value="90"/>
      </div>
      <button id="play">&#9654;&nbsp; Animate</button>
      <div class="modeGroup" id="modeGroup" role="radiogroup" aria-label="Construction">
        <input type="radio" name="mode" id="mode-gerver" value="gerver" checked/><label for="mode-gerver">Gerver only</label>
        <input type="radio" name="mode" id="mode-parallelogram" value="parallelogram"/><label for="mode-parallelogram">Parallelogram only</label>
        <input type="radio" name="mode" id="mode-optimal" value="optimal"/><label for="mode-optimal">Optimal</label>
      </div>
    </div>

    <div class="ctlrow">
      <div class="ctl" style="min-width:100%">
        <div class="lab"><span>Motion (scrub)</span><span>enter &rarr; turn &rarr; exit</span></div>
        <input type="range" id="scrub" min="0" max="100" step="0.25" value="0"/>
      </div>
    </div>

    <div class="ctlrow">
      <div class="ctl">
        <div class="lab"><span>Entry hallway length</span><b><span id="einLen">&mdash;</span></b></div>
        <input type="range" id="ein" min="0" max="24" step="0.5" value="0"/>
      </div>
      <div class="ctl">
        <div class="lab"><span>Exit hallway length</span><b><span id="eoutLen">&mdash;</span></b></div>
        <input type="range" id="eout" min="0" max="24" step="0.5" value="0"/>
      </div>
    </div>

    <div class="ctlrow">
      <div class="ctl" style="max-width:420px">
        <div class="lab"><span>Zoom</span><b><span id="zval">&mdash;</span>&times;</b></div>
        <input type="range" id="zoom" min="0" max="1000" step="1" value="500"/>
      </div>
      <button id="reset">reset view</button>
      <span class="hint">scroll to zoom &middot; drag to pan</span>
    </div>

    <div id="game"></div>
    <div id="status">Calculating&hellip;</div>
  </div>

<script src="/assets/js/phaser.min.js"></script>

  // changes the visible corridor: only the couch inside it changes.
  var ARM_BASE = 6;
  var sliderToZoom = function (v) { return ZMIN * Math.pow(ZMAX / ZMIN, v / 1000); };
  var zoomToSlider = function (z) { return 1000 * Math.log(z / ZMIN) / Math.log(ZMAX / ZMIN); };
  var clamp = function (x, a, b) { return x < a ? a : (x > b ? b : x); };

  /* ----- per-alpha rebuild (shape + hallway lengths + readouts) -----
     Three modes: "Gerver only" and "Parallelogram only" render a single
     construction across the whole slider range (Gerver-only is exactly the
     original app). "Optimal" shows the parallelogram where it genuinely wins
     (very sharp corners) and the Gerver stationary shape everywhere else. The
     always-present top badge names the regime; no Hammersley shape is rendered
     (that construction's turning motion is a research-level result; see the
     note in the SofaMath module). */
  function rebuildShape() {
    var mode = getMode();
    var rd = SM.describeRegime(APP.alpha);
    if (mode === 'parallelogram') {
      APP.shape = SM.buildParallelogram(APP.alpha); APP.construction = 'parallelogram';
    } else if (mode === 'optimal' && rd.areas.bestName === 'parallelogram') {
      APP.shape = SM.buildParallelogram(APP.alpha); APP.construction = 'parallelogram';
    } else {
      APP.shape = SM.buildShape(APP.alpha); APP.construction = 'gerver';
    }
    APP.entryLen = Math.max(APP.shape.minLin, ARM_BASE) + APP.entryExtra;
    APP.exitLen = Math.max(APP.shape.minLout, ARM_BASE) + APP.exitExtra;
    areaEl.textContent = APP.shape.area.toFixed(3);
    regimeEl.textContent = mode === 'gerver' ? (APP.alpha < 89.5 ? 'acute corner' : (APP.alpha > 90.5 ? 'obtuse corner' : 'right angle')) : rd.label;
    einLen.textContent = APP.entryLen.toFixed(1);
    eoutLen.textContent = APP.exitLen.toFixed(1);
  }
  function updateLengths() {
    APP.entryLen = Math.max(APP.shape.minLin, ARM_BASE) + APP.entryExtra;
    APP.exitLen = Math.max(APP.shape.minLout, ARM_BASE) + APP.exitExtra;
    einLen.textContent = APP.entryLen.toFixed(1);
    eoutLen.textContent = APP.exitLen.toFixed(1);
  }

  /* ----- geometry helpers (math coords, y-up) ----- */
  function corridorPolyMath() {
    var phi = APP.shape.phi, O = [Math.tan(phi / 2), 1], edx = Math.cos(phi), edy = -Math.sin(phi);
    var Lin = APP.entryLen, Lout = APP.exitLen, th = Math.tan(phi / 2);
    // The entry mouth (x = -Lin) is already a perpendicular cut. Extend the
    // OUTER exit wall by tan(phi/2) past the inner wall's far end so the exit
    // mouth is likewise perpendicular to the corridor axis e (its edge then
    // runs along the wall normal (sinφ,cosφ)), mirroring the entry.
    return [[-Lin, 1], O, [O[0] + (Lout + th) * edx, O[1] + (Lout + th) * edy], [Lout * edx, Lout * edy], [0, 0], [-Lin, 0]];
  }
  function couchVertsMath(tau) {
    var sh = APP.shape;
    var pz = sh.poseFn ? sh.poseFn(tau) : SM.pose(tau, { phi: sh.phi, Din: sh.Din, Dout: sh.Dout, xyAt: sh.xyAt });
    var c = Math.cos(pz.th), s = Math.sin(pz.th), P = sh.poly, out = new Array(P.length);
    for (var i = 0; i < P.length; i++) out[i] = [c * P[i][0] - s * P[i][1] + pz.vx, s * P[i][0] + c * P[i][1] + pz.vy];
    return out;
  }
  var toPhaser = function (pts) { var o = new Array(pts.length); for (var i = 0; i < pts.length; i++) o[i] = { x: pts[i][0], y: -pts[i][1] }; return o; };

  /* ----- rendering (constant on-screen stroke widths via /zoom) ----- */
  function render() {
    if (!APP.ready) return;
    var z = APP.cam.zoom;
    var corr = toPhaser(corridorPolyMath());
    APP.gCorr.clear();
    APP.gCorr.fillStyle(0xefe9db, 1); APP.gCorr.fillPoints(corr, true);
    APP.gCorr.lineStyle(2.5 / z, 0xb0bec5, 1); APP.gCorr.strokePoints(corr, true);
    var couch = toPhaser(couchVertsMath(APP.tau));
    APP.gCouch.clear();
    APP.gCouch.fillStyle(0xa67b5b, 0.92); APP.gCouch.fillPoints(couch, true);
    APP.gCouch.lineStyle(1.7 / z, 0x593302, 1); APP.gCouch.strokePoints(couch, true);
  }

  /* ----- camera: uniform zoom, pan, fit ----- */
  function syncZoomUI() { zoomS.value = clamp(zoomToSlider(APP.cam.zoom), 0, 1000); zval.textContent = Math.round(APP.cam.zoom); }
  function setZoomAboutScreen(sx, sy, newZoom) {
    var cam = APP.cam, z = clamp(newZoom, ZMIN, ZMAX);
    var before = cam.getWorldPoint(sx, sy); cam.setZoom(z); var after = cam.getWorldPoint(sx, sy);
    cam.scrollX += before.x - after.x; cam.scrollY += before.y - after.y;
    syncZoomUI(); render();
  }
  function setZoomKeepCenter(newZoom) {
    var cam = APP.cam; setZoomAboutScreen(cam.width / 2, cam.height / 2, newZoom);
  }
  // Frame the bend: sofa mid-turn + both hallway mouths (not the whole extended corridor).
  function resetView() {
    var sh = APP.shape, phi = sh.phi, O = [Math.tan(phi / 2), 1], edx = Math.cos(phi), edy = -Math.sin(phi);
    var pts = couchVertsMath(0.5).slice();
    pts.push([0, 0], O, [-2.5, 0], [-2.5, 1], [O[0] + 2.5 * edx, O[1] + 2.5 * edy], [2.5 * edx, 2.5 * edy]);
    var mx0 = 1e9, mx1 = -1e9, my0 = 1e9, my1 = -1e9;
    for (var i = 0; i < pts.length; i++) { var p = pts[i]; if (p[0] < mx0) mx0 = p[0]; if (p[0] > mx1) mx1 = p[0]; if (p[1] < my0) my0 = p[1]; if (p[1] > my1) my1 = p[1]; }
    var m = 0.4; mx0 -= m; mx1 += m; my0 -= m; my1 += m;
    var cam = APP.cam, vw = cam.width, vh = cam.height;
    // Phaser world (y-down): x unchanged, y -> -y
    var w = mx1 - mx0, h = my1 - my0;
    var z = clamp(Math.min(vw / w, vh / h) * 0.92, ZMIN, ZMAX);
    cam.setZoom(z);
    cam.centerOn((mx0 + mx1) / 2, -(my0 + my1) / 2);
    syncZoomUI(); render();
  }

  /* ----- Phaser scene ----- */
  class SofaScene extends Phaser.Scene {
    constructor() { super('sofa'); }
    create() {
      APP.scene = this; APP.cam = this.cameras.main;
      APP.gCorr = this.add.graphics(); APP.gCouch = this.add.graphics();

      // wheel zoom about pointer
      this.input.on('wheel', function (ptr, over, dx, dy) {
        var factor = dy > 0 ? 0.88 : 1.136;
        setZoomAboutScreen(ptr.x, ptr.y, APP.cam.zoom * factor);
      });
      // drag pan
      var dragging = false, lx = 0, ly = 0;
      this.input.on('pointerdown', function (ptr) { dragging = true; lx = ptr.x; ly = ptr.y; gameDiv.classList.add('grabbing'); });
      var endDrag = function () { dragging = false; gameDiv.classList.remove('grabbing'); };
      this.input.on('pointerup', endDrag);
      this.input.on('pointerupoutside', endDrag);
      this.input.on('pointermove', function (ptr) {
        if (!dragging) return;
        APP.cam.scrollX -= (ptr.x - lx) / APP.cam.zoom; APP.cam.scrollY -= (ptr.y - ly) / APP.cam.zoom;
        lx = ptr.x; ly = ptr.y;
      });
      // keep proportions correct on container resize
      this.scale.on('resize', function () { render(); });
      // wheel over the canvas zooms; don't let it scroll the surrounding page (esp. in an iframe)
      gameDiv.addEventListener('wheel', function (e) { e.preventDefault(); }, { passive: false });

      APP.ready = true;
      rebuildShape();
      resetView();
      render();
    }
    update(time, delta) {
      if (!APP.playing) return;
      APP.tau += Math.min(0.05, delta / 1000) * 0.16;
      if (APP.tau > 1) APP.tau -= 1;
      scrub.value = APP.tau * 100;
      render();
    }
  }

  /* ----- UI wiring ----- */
  playBtn.addEventListener('click', function () {
    APP.playing = !APP.playing;
    playBtn.innerHTML = APP.playing ? '❚❚&nbsp; Pause' : '▶&nbsp; Animate';
  });
  scrub.addEventListener('input', function () {
    APP.playing = false; playBtn.innerHTML = '▶&nbsp; Animate';
    APP.tau = +scrub.value / 100; render();
  });
  alphaSlider.addEventListener('input', function () {
    APP.alpha = +alphaSlider.value; aval.textContent = APP.alpha.toFixed(1);
    rebuildShape(); render();
  });
  einS.addEventListener('input', function () { APP.entryExtra = +einS.value; updateLengths(); render(); });
  eoutS.addEventListener('input', function () { APP.exitExtra = +eoutS.value; updateLengths(); render(); });
  zoomS.addEventListener('input', function () { setZoomKeepCenter(sliderToZoom(+zoomS.value)); });
  resetBtn.addEventListener('click', resetView);
  modeGroupEl.addEventListener('change', function () {
    // Keep the camera exactly where it is — with the long shared arms, the
    // corridor is identical across constructions, so only the couch swaps.
    APP.playing = false; playBtn.innerHTML = '▶&nbsp; Animate'; APP.tau = 0; scrub.value = 0;
    rebuildShape(); render();
  });

  /* ----- boot: build the solution family (reporting progress), then start Phaser ----- */
  statusEl.textContent = 'Calculating… 0%';
  setTimeout(function () {
    SM.buildFamily(function (frac) {
      statusEl.textContent = 'Calculating… ' + Math.round(frac * 100) + '%';
    }).then(function (rng) {
      // clamp alpha slider to the achievable family range
      alphaSlider.min = rng.AMIN; alphaSlider.max = rng.AMAX;
      if (+alphaSlider.value < rng.AMIN) alphaSlider.value = rng.AMIN;
      if (+alphaSlider.value > rng.AMAX) alphaSlider.value = rng.AMAX;
      APP.alpha = +alphaSlider.value; aval.textContent = APP.alpha.toFixed(1);
      statusEl.textContent = '';

      new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game',
        backgroundColor: '#f7f5f0',
        scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' },
        render: { antialias: true },
        scene: SofaScene
      });
    });
  }, 30);
})();

</script>
<script>

/* ---- report content height to the parent widget layout (auto-height) ---- */
(function () {
  var last = 0;
  function report() {
    var h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    if (Math.abs(h - last) < 2) return;
    last = h;
    try { parent.postMessage({ embedHeight: h }, '*'); } catch (e) {}
  }
  window.addEventListener('load', report);
  window.addEventListener('resize', report);
  if (window.ResizeObserver) { try { new ResizeObserver(report).observe(document.body); } catch (e) {} }
  [120, 400, 900, 1600].forEach(function (t) { setTimeout(report, t); });
})();

</script>
</body>
