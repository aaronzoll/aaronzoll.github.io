  <div class="desmos-body">

    <div class="desmos-embed-section">
      

        <div class="desmos-controls">
          <button class="desmos-toggle-btn" id="toggle-btn" onclick="toggleExpressions()">Show Expressions</button>
        </div>

        <div class="desmos-embed-container">
          <div id="calculator"></div>
        </div>

        <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=88d0c7b9a32a465da20a22e0e61756f3"></script>
        <script>
          (function () {
            var expressionsVisible = false;
            var calc = window.desmosCalc = Desmos.Calculator(document.getElementById('calculator'), {
              expressions: false,
              settingsMenu: false,
              keypad: false,
            });

            fetch('/assets/desmos/json_files/legendre_transform.json')
              .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
              })
              .then(function (state) {
                calc.setState(state);
                if (typeof window.onDesmosReady === 'function') window.onDesmosReady(calc);
              })
              .catch(function (err) {
                document.getElementById('calculator').innerHTML =
                  '<div class="desmos-error">Could not load graph state: ' + err.message + '</div>';
              });

            window.toggleExpressions = function () {
              expressionsVisible = !expressionsVisible;
              calc.updateSettings({ expressions: expressionsVisible });
              document.getElementById('toggle-btn').textContent =
                expressionsVisible ? 'Hide Expressions' : 'Show Expressions';
            };
          })();
        </script>
